version: '3.8'

services:
  # 1. TypeScript Real-time Metrics Dashboard Service
  dashboard:
    build:
      context: ./ts_dashboard
      dockerfile: Dockerfile
    container_name: antigravity_dashboard
    ports:
      - "4001:4001"
    volumes:
      # Mount shared metrics database from host to container in read-only mode
      - ./shared:/app/shared:ro
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      
